<!-- Head favicon (Next file convention → <link rel="icon">). Keep visually in sync with public/icon.svg, which the web manifest references by stable URL. -->
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#141d29"/>
      <stop offset="1" stop-color="#070a0f"/>
    </linearGradient>
    <radialGradient id="glow" cx="368" cy="138" r="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff7a40" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#ff7a40" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="seaGlow" cx="150" cy="430" r="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2ad0ef" stop-opacity="0.28"/>
