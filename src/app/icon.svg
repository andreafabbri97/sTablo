  <path d="M331 137l29 15 29-15M360 108v30" stroke="#1a2200" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <circle cx="342" cy="132" r="13" fill="#ffffff" opacity="0.45"/>
